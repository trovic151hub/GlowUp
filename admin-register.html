<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Restricted — Pearl Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #F5F2F3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .icon {
      width: 56px; height: 56px;
      background: #f3e8ec;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .icon svg { width: 26px; height: 26px; color: #8B3A52; fill: none; stroke: #8B3A52; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: #2D1A22; margin-bottom: 10px; }
    p { color: #9B7A87; font-size: 0.9rem; line-height: 1.6; margin-bottom: 28px; }
    a {
      display: inline-block;
      background: #8B3A52;
      color: #fff;
      padding: 11px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    a:hover { background: #7C3A52; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1>Registration Closed</h1>
    <p>Admin accounts are invite-only. New admins can only be created by an existing administrator from within the dashboard.</p>
    <a href="admin.html">Go to Admin Login</a>
  </div>
</body>
</html>
